<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escape from Darwin's Ship</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Georgia', serif;
      color:white;

      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
        url('https://images.unsplash.com/photo-1520034475321-cbe63696469a?q=80&w=2070&auto=format&fit=crop');

      background-size:cover;
      background-position:center;

      animation: moveBackground 20s infinite alternate ease-in-out;
    }

    @keyframes moveBackground{
      from{
        background-position:center top;
      }
      to{
        background-position:center bottom;
      }
    }

    .container{
      width:90%;
      max-width:700px;

      background:rgba(59,38,24,0.75);

      border:4px solid rgba(255,255,255,0.15);

      padding:50px 30px;

      border-radius:24px;

      text-align:center;

      backdrop-filter: blur(3px);

      box-shadow:0 0 40px rgba(0,0,0,0.6);
    }

    .subtitle{
      letter-spacing:4px;
      font-size:14px;
      opacity:0.8;
      margin-bottom:20px;
    }

    h1{
      font-size:58px;
      line-height:1.1;
      margin-bottom:25px;
    }

    .description{
      font-size:18px;
      line-height:1.8;
      opacity:0.9;
      margin-bottom:40px;
    }

    #timer{
      font-size:110px;
      font-weight:bold;
      margin-bottom:40px;

      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 30px rgba(255,255,255,0.1);
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    button{
      padding:16px 34px;

      border:none;
      border-radius:14px;

      font-size:18px;
      font-weight:bold;

      cursor:pointer;

      transition:0.25s;
    }

    .start{
      background:#d1a46c;
      color:#2b1a10;
    }

    .reset{
      background:#5e4635;
      color:white;
    }

    button:hover{
      transform:scale(1.05);
    }

    .warning{
      margin-top:30px;
      font-size:16px;
      opacity:0.8;
      font-style:italic;
    }

    .finished{
      color:#ff6b6b;
      animation: flash 1s infinite;
    }

    @keyframes flash{
      0%{opacity:1;}
      50%{opacity:0.4;}
      100%{opacity:1;}
    }

    @media(max-width:700px){

      h1{
        font-size:40px;
      }

      #timer{
        font-size:72px;
      }

      .description{
        font-size:16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="subtitle">
      BEAGLE SHIP EMERGENCY ACCESS
    </div>

    <h1>
      Escape from<br>
      Darwin’s Ship
    </h1>

    <div class="description">
      The Royal Navy is approaching.<br>
      Solve every clue and escape before time runs out.
    </div>

    <div id="timer">
      20:00
    </div>

    <div class="buttons">
      <button class="start" onclick="startTimer()">
        START
      </button>

      <button class="reset" onclick="resetTimer()">
        RESET
      </button>
    </div>

    <div class="warning">
      “Once the ship reaches England,<br>
      your true name will disappear forever.”
    </div>

  </div>

  <audio id="tick" loop>
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
  </audio>

  <script>

    let time = 1200;
    let timer;
    let running = false;

    const timerDisplay = document.getElementById("timer");
    const tickSound = document.getElementById("tick");

    function updateDisplay(){

      let minutes = Math.floor(time / 60);
      let seconds = time % 60;

      minutes = minutes < 10 ? "0" + minutes : minutes;
      seconds = seconds < 10 ? "0" + seconds : seconds;

      timerDisplay.innerHTML = `${minutes}:${seconds}`;
    }

    function startTimer(){

      if(running) return;

      running = true;

      tickSound.volume = 0.15;
      tickSound.play();

      timer = setInterval(()=>{

        time--;

        updateDisplay();

        if(time <= 0){

          clearInterval(timer);

          timerDisplay.innerHTML = "TIME OVER";
          timerDisplay.classList.add("finished");

          document.body.style.background =
          "linear-gradient(rgba(120,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1520034475321-cbe63696469a?q=80&w=2070&auto=format&fit=crop')";

          tickSound.pause();

          alert("The Royal Navy has arrived...");
        }

      },1000);
    }

    function resetTimer(){

      clearInterval(timer);

      running = false;

      time = 1200;

      updateDisplay();

      timerDisplay.classList.remove("finished");

      tickSound.pause();
      tickSound.currentTime = 0;
    }

    updateDisplay();

  </script>

</body>
</html>
